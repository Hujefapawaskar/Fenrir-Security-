<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Fenrir Security Social Card</title>
  <desc id="desc">Automated security testing platform preview image</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g opacity="0.28">
    <circle cx="1030" cy="120" r="240" fill="#0ea5e9"/>
    <circle cx="160" cy="530" r="260" fill="#0d9488"/>
  </g>
  <rect x="90" y="90" width="1020" height="450" rx="28" fill="#0b1220" stroke="#1e293b" stroke-width="2"/>
  <g transform="translate(145 170)">
    <rect width="90" height="90" rx="22" fill="#0f172a"/>
    <circle cx="45" cy="45" r="24" fill="none" stroke="url(#accent)" stroke-width="8"/>
    <circle cx="45" cy="45" r="8" fill="#5eead4"/>
  </g>
  <text x="270" y="230" fill="#e2e8f0" font-size="58" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">Fenrir Security</text>
  <text x="145" y="320" fill="#99f6e4" font-size="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="600">AI-Powered Continuous Security Testing</text>
  <text x="145" y="380" fill="#94a3b8" font-size="29" font-family="Inter, Segoe UI, Arial, sans-serif">Detect vulnerabilities faster with automated scan workflows.</text>
  <text x="145" y="430" fill="#94a3b8" font-size="29" font-family="Inter, Segoe UI, Arial, sans-serif">Track severity, monitor progress, and export actionable reports.</text>
  <rect x="145" y="470" width="290" height="52" rx="12" fill="url(#accent)"/>
  <text x="190" y="505" fill="#052e2b" font-size="26" font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="700">fenrirsec.com</text>
</svg>
